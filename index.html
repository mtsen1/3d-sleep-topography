<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Topography: Step-Function Threshold Coloring</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #030306; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; 
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #panel {
            position: absolute; top: 25px; left: 25px; background: rgba(4, 4, 10, 0.95);
            padding: 20px; border-radius: 10px; border: 1px solid #151525;
            backdrop-filter: blur(8px); z-index: 10; max-width: 290px; pointer-events: none;
        }
        h1 { margin: 0 0 4px 0; font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase; color: #e2e4f0; }
        p { margin: 0; font-size: 0.7rem; color: #585d7a; line-height: 1.4; }
        
        #stage-legend {
            position: absolute; bottom: 25px; right: 25px; background: rgba(4, 4, 10, 0.95);
            padding: 15px 18px; border-radius: 10px; border: 1px solid #151525;
            backdrop-filter: blur(8px); z-index: 10; min-width: 200px; pointer-events: none;
        }
        .legend-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #a0a5c0; margin-bottom: 10px; }
        .legend-item { display: flex; align-items: center; font-size: 0.7rem; margin-bottom: 6px; color: #b2b7cf; }
        .legend-item:last-child { margin-bottom: 0; }
        .color-pill { width: 24px; height: 10px; border-radius: 2px; margin-right: 12px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="panel">
        <h1>Sleep Topography</h1>
        <p>A solid 3D landscape modeling structural sleep trends across consecutive nights.</p>
    </div>

    <div id="stage-legend">
        <div class="legend-title">Topographic Scale</div>
        <div class="legend-item"><div class="color-pill" style="background: #e2b65d;"></div>W - Awake Peaks (18.0)</div>
        <div class="legend-item"><div class="color-pill" style="background: #52828a;"></div>N1 - Light Transition (12.0)</div>
        <div class="legend-item"><div class="color-pill" style="background: #cd5c74;"></div>REM - Active Dream (10.0)</div>
        <div class="legend-item"><div class="color-pill" style="background: #3f5b96;"></div>N2 - Restful Bedrock (8.0)</div>
        <div class="legend-item"><div class="color-pill" style="background: #2d224d;"></div>N3 - Deep Slow Wave (1.5)</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030306, 0.005);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(65, 55, 85); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.7); 
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.3); 
        sunLight.position.set(20, 100, 30);
        scene.add(sunLight);

        function buildAxisRod(startVec, endVec) {
            const pathSpline = new THREE.LineCurve3(startVec, endVec);
            const tubeGeometry = new THREE.TubeGeometry(pathSpline, 2, 0.35, 8, false); 
            const tubeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene.add(tubeMesh);
        }

        function createParallelAxisLabel(textString, centerPosition, rotationY) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, 512, 128);
            ctx.font = 'bold 36px -apple-system, sans-serif'; 
            ctx.fillStyle = '#b2b7cf'; 
            ctx.textAlign = 'center';      
            ctx.textBaseline = 'middle';
            ctx.fillText(textString, 256, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
            
            const textWidth = 24; 
            const textHeight = 6;
            const geometry = new THREE.PlaneGeometry(textWidth, textHeight);
            const planeMesh = new THREE.Mesh(geometry, material);
            
            planeMesh.rotation.set(-Math.PI / 2, 0, rotationY);
            planeMesh.position.copy(centerPosition);
            scene.add(planeMesh);
        }

        function createVerticalClimbingLabel(textString, centerPosition) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, 512, 128);
            ctx.font = 'bold 36px -apple-system, sans-serif'; 
            ctx.fillStyle = '#b2b7cf'; 
            ctx.textAlign = 'center';      
            ctx.textBaseline = 'middle';
            ctx.fillText(textString, 256, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
            
            const textWidth = 24; 
            const textHeight = 6;
            const geometry = new THREE.PlaneGeometry(textWidth, textHeight);
            const planeMesh = new THREE.Mesh(geometry, material);
            
            planeMesh.rotation.set(0, -Math.PI / 4, Math.PI / 2);
            planeMesh.position.copy(centerPosition);
            scene.add(planeMesh);
        }

        function buildTimelineTicks(startX, endX, originY, originZ, totalHours = 8) {
            for (let i = 0; i <= totalHours; i++) {
                const ratio = i / totalHours;
                const currentX = startX + ratio * (endX - startX);
                
                buildAxisRod(
                    new THREE.Vector3(currentX, originY, originZ),
                    new THREE.Vector3(currentX, originY, originZ + 1.2)
                );
                
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 128, 64);
                ctx.font = 'bold 32px -apple-system, sans-serif';
                ctx.fillStyle = '#6e7392'; 
                ctx.textAlign = 'center';
                ctx.fillText(`H${i}`, 64, 32);
                
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                const geometry = new THREE.PlaneGeometry(4, 2);
                const mesh = new THREE.Mesh(geometry, material);
                
                mesh.rotation.set(-Math.PI / 2, 0, 0);
                mesh.position.set(currentX, originY + 0.05, originZ + 2.4);
                scene.add(mesh);
            }
        }

        fetch('./public/sleep_terrain.json')
            .then(res => res.json())
            .then(payload => {
                const matrix = payload.heightmap;
                const rows = matrix.length;       
                const segments = matrix[0].length; 

                const mapWidth = 90;
                const mapDepth = 60;
                
                const leftX  = -mapWidth / 2;
                const rightX = mapWidth / 2;
                const frontZ = mapDepth / 2;
                const backZ  = -mapDepth / 2;

                const originX = leftX - 3;
                const originY = 0.2; 
                const originZ = frontZ + 3;
                const zMidpoint = (originZ + backZ) / 2;

                // 🔴 X-Axis (Time of Night timeline)
                buildAxisRod(
                    new THREE.Vector3(originX, originY, originZ),
                    new THREE.Vector3(rightX, originY, originZ)
                );
                const xMidpoint = (originX + rightX) / 2;
                createParallelAxisLabel(
                    "TIME OF NIGHT ➔", 
                    new THREE.Vector3(xMidpoint, originY + 0.1, originZ + 5.5), 
                    0
                );
                buildTimelineTicks(originX, rightX, originY, originZ, 8);

                // 🔵 Z-Axis (Calendar Day multi-night progression)
                buildAxisRod(
                    new THREE.Vector3(originX, originY, originZ),
                    new THREE.Vector3(originX, originY, backZ)
                );
                createParallelAxisLabel(
                    "⬅ CALENDAR DAY", 
                    new THREE.Vector3(originX - 4.5, originY + 0.1, zMidpoint), 
                    -Math.PI / 2
                );

                // 🟢 Y-Axis (Vertical framework tube mapping height)
                buildAxisRod(
                    new THREE.Vector3(originX, originY, originZ),
                    new THREE.Vector3(originX, 18.0, originZ)
                );
                createVerticalClimbingLabel(
                    "SLEEP DEPTH ➔", 
                    new THREE.Vector3(originX - 2.5, 9.0, originZ + 2.5)
                );

                // Build Base High-Density Plane Mesh Geometry
                const geometry = new THREE.PlaneGeometry(mapWidth, mapDepth, segments - 1, rows - 1);
                const vertices = geometry.attributes.position.array;
                const totalVertices = geometry.attributes.position.count;
                const colorsArray = new Float32Array(totalVertices * 3);
                
                const colorN3    = new THREE.Color(0x2d224d); 
                const colorN2    = new THREE.Color(0x3f5b96); 
                const colorN1    = new THREE.Color(0x52828a); 
                const colorREM   = new THREE.Color(0xcd5c74); 
                const colorWake  = new THREE.Color(0xe2b65d); 

                for (let r = 0; r < rows; r++) {
                    const rawControlPoints = [];
                    for (let s = 0; s < segments; s++) {
                        const targetX = leftX + (s / (segments - 1)) * mapWidth;
                        const targetZ = backZ + (r / (rows - 1)) * mapDepth;
                        rawControlPoints.push(new THREE.Vector3(targetX, matrix[r][s], targetZ));
                    }

                    const timelineSpline = new THREE.CatmullRomCurve3(rawControlPoints);
                    timelineSpline.tension = 0.15; 
                    
                    const highDensitySplinePoints = timelineSpline.getPoints(segments - 1);

                    for (let s = 0; s < segments; s++) {
                        const vertexIdx = (r * segments + s) * 3;
                        const currentHeight = highDensitySplinePoints[s].y;

                        vertices[vertexIdx]     = highDensitySplinePoints[s].x;
                        vertices[vertexIdx + 1] = currentHeight; 
                        vertices[vertexIdx + 2] = highDensitySplinePoints[s].z;

                        // 🌟 FIXED: STEP-FUNCTION THRESHOLD COLOR MAPPER
                        // Evaluates heights categorically to remove deceptive multi-stage gradient bleeding
                        const mixColor = new THREE.Color();

                        if (currentHeight <= 4.0) {
                            mixColor.copy(colorN3);   // Pure Deep Slow Wave (1.5)
                        } else if (currentHeight > 4.0 && currentHeight <= 9.0) {
                            mixColor.copy(colorN2);   // Pure Restful Bedrock (8.0)
                        } else if (currentHeight > 9.0 && currentHeight <= 11.0) {
                            mixColor.copy(colorREM);  // Pure Active Dream REM (10.0)
                        } else if (currentHeight > 11.0 && currentHeight <= 15.0) {
                            mixColor.copy(colorN1);   // Pure Light Transition (12.0)
                        } else {
                            mixColor.copy(colorWake);  // Pure Awake Peaks (18.0)
                        }

                        colorsArray[vertexIdx]     = mixColor.r;
                        colorsArray[vertexIdx + 1] = mixColor.g;
                        colorsArray[vertexIdx + 2] = mixColor.b;
                    }
                }
                
                geometry.attributes.position.needsUpdate = true;
                geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
                geometry.computeVertexNormals();

                const matteMaterial = new THREE.MeshStandardMaterial({
                    vertexColors: true,
                    roughness: 0.85, 
                    metalness: 0.05, 
                    flatShading: false,
                    side: THREE.DoubleSide
                });

                const terrainMesh = new THREE.Mesh(geometry, matteMaterial);
                scene.add(terrainMesh);
            })
            .catch(err => console.error("Production framework initialization exception: ", err));

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
